<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virelle Studios</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-app-region: drag;
    }

    .splash {
      width: 480px;
      height: 320px;
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%);
      border-radius: 20px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 60px rgba(139, 92, 246, 0.15),
        0 40px 80px rgba(0, 0, 0, 0.8);
    }

    /* Ambient glow */
    .splash::before {
      content: "";
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #8B5CF6, #6D28D9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4); }
      50% { box-shadow: 0 8px 48px rgba(139, 92, 246, 0.7); }
    }

    .app-name {
      font-size: 26px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .app-tagline {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #8B5CF6, #A78BFA);
      border-radius: 2px;
      animation: load 1.8s ease-in-out infinite;
    }

    @keyframes load {
      0% { width: 0%; margin-left: 0; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    .version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo-wrap">
      <div class="logo-icon">🎬</div>
      <div>
        <div class="app-name">Virelle Studios</div>
        <div class="app-tagline">AI Film Production Platform</div>
      </div>
    </div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <div class="version" id="version">Loading...</div>
  </div>
</body>
</html>
